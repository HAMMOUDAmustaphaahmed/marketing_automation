<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <!-- Background circle -->
  <circle cx="100" cy="80" r="60" fill="#f1f5f9"/>
  <!-- Box/folder -->
  <rect x="65" y="55" width="70" height="55" rx="6" fill="#e2e8f0"/>
  <rect x="65" y="50" width="35" height="12" rx="4" fill="#cbd5e1"/>
  <!-- Lines inside folder -->
  <rect x="75" y="75" width="50" height="5" rx="2.5" fill="#94a3b8"/>
  <rect x="75" y="86" width="40" height="5" rx="2.5" fill="#cbd5e1"/>
  <rect x="75" y="97" width="30" height="5" rx="2.5" fill="#cbd5e1"/>
  <!-- Magnifier -->
  <circle cx="130" cy="110" r="14" fill="none" stroke="#94a3b8" stroke-width="3"/>
  <line x1="140" y1="120" x2="150" y2="130" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <!-- Question mark inside magnifier -->
  <text x="130" y="115" dominant-baseline="middle" text-anchor="middle"
        font-family="sans-serif" font-size="12" font-weight="700" fill="#94a3b8">?</text>
</svg>
