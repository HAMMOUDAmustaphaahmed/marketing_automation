<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#1e429f"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="url(#grad)"/>
  <!-- Letter S stylized -->
  <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="26" font-weight="800"
        fill="white" letter-spacing="-1">S</text>
  <!-- Small M tag -->
  <rect x="28" y="30" width="16" height="10" rx="3" fill="rgba(255,255,255,0.2)"/>
  <text x="36" y="37.5" dominant-baseline="middle" text-anchor="middle"
        font-family="'Segoe UI', sans-serif" font-size="7" font-weight="700"
        fill="white">MAS</text>
</svg>
