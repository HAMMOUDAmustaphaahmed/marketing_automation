{% extends "base.html" %}
{% block title %}{% if prospect %}Modifier{% else %}Ajouter{% endif %} un Prospect{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{% if prospect %}Modifier{% else %}Ajouter{% endif %} un Prospect</h1>
</div>
<div class="card" style="max-width:720px;">
    <div class="card-body">
        <form action="{% if prospect %}{{ url_for('prospects.edit', id=prospect.id) }}{% else %}{{ url_for('prospects.add') }}{% endif %}" method="POST">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label fw-600">Nom de l'entreprise *</label>
                    <input type="text" name="company_name" class="form-control" value="{{ prospect.company_name if prospect else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-600">Taille</label>
                    <select name="size" class="form-select">
                        <option value="">—</option>
                        {% for s in ['TPE', 'PME', 'ETI', 'GE'] %}
                        <option value="{{ s }}" {% if prospect and prospect.size == s %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">Secteur</label>
                    <input type="text" name="sector" class="form-control" value="{{ prospect.sector if prospect else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">Sous-secteur</label>
                    <input type="text" name="sub_sector" class="form-control" value="{{ prospect.sub_sector if prospect else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">Pays</label>
                    <input type="text" name="country" class="form-control" value="{{ prospect.country if prospect else 'Tunisie' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">Ville</label>
                    <input type="text" name="city" class="form-control" value="{{ prospect.city if prospect else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">Contact (nom)</label>
                    <input type="text" name="contact_name" class="form-control" value="{{ prospect.contact_name if prospect else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">Titre / Poste</label>
                    <input type="text" name="contact_title" class="form-control" value="{{ prospect.contact_title if prospect else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ prospect.email if prospect else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">Téléphone</label>
                    <input type="text" name="phone" class="form-control" value="{{ prospect.phone if prospect else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">Site Web</label>
                    <input type="url" name="website" class="form-control" value="{{ prospect.website if prospect else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-600">LinkedIn</label>
                    <input type="url" name="linkedin_url" class="form-control" value="{{ prospect.linkedin_url if prospect else '' }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-600">Score de pertinence (1-100)</label>
                    <input type="number" name="relevance_score" class="form-control" value="{{ prospect.relevance_score if prospect else 50 }}" min="1" max="100">
                </div>
                {% if prospect %}
                <div class="col-md-4">
                    <label class="form-label fw-600">Statut</label>
                    <select name="status" class="form-select">
                        {% for key, label in status_labels.items() %}
                        <option value="{{ key }}" {% if prospect.status == key %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}
                <div class="col-12">
                    <label class="form-label fw-600">Pourquoi ce prospect est pertinent</label>
                    <textarea name="why_relevant" class="form-control" rows="2">{{ prospect.why_relevant if prospect else '' }}</textarea>
                </div>
                <div class="col-12">
                    <label class="form-label fw-600">Notes</label>
                    <textarea name="notes" class="form-control" rows="2">{{ prospect.notes if prospect else '' }}</textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-3">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Enregistrer</button>
                <a href="{{ url_for('prospects.index') }}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
