{% extends "base.html" %}
{% block title %}Contrat de Maintenance{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Nouveau Contrat de Maintenance</h1>
    <p>BC : {{ order.order_number }}</p>
</div>
<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form action="{{ url_for('pipeline.create_maintenance', order_id=order.id) }}" method="POST" enctype="multipart/form-data">
            <div class="row g-3 mb-3">
                <div class="col-sm-6">
                    <label class="form-label fw-600">Date de début</label>
                    <input type="date" name="start_date" class="form-control" required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label fw-600">Date de fin</label>
                    <input type="date" name="end_date" class="form-control" required>
                </div>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-sm-6">
                    <label class="form-label fw-600">Valeur annuelle</label>
                    <input type="number" name="annual_value" class="form-control" step="0.01" min="0" placeholder="0.00">
                </div>
                <div class="col-sm-6">
                    <label class="form-label fw-600">Devise</label>
                    <select name="currency" class="form-select">
                        <option value="TND">TND</option>
                        <option value="EUR">EUR</option>
                        <option value="USD">USD</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-600">Contrat signé (PDF)</label>
                <input type="file" name="contract_file" class="form-control" accept=".pdf,.doc,.docx">
            </div>
            <div class="mb-3">
                <label class="form-label fw-600">Notes</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning text-dark"><i class="fas fa-tools me-1"></i>Créer le contrat</button>
                <a href="{{ url_for('pipeline.view_opportunity', id=order.opportunity_id) }}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
